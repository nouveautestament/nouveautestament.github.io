<body>






<div id="main">
<!-- height: 500px; overflow-y: scroll; width:100%;padding: 10px; -->
	<div id="divsms" style="">
		<table  cellspacing="0" id="messages"></table>
	</div>
	<div id="tt">
		<input autofocus type="text" id="messageBox" onkeypress="if (event.keyCode == 13) sender()" style="width:100%; padding:10px;"/>
	</div>
</div>	

</body>

<script>



x = 0;




function getdate()
{

    //Date object
    var d = new Date();


    // subtract local time zone offset : UTC time in msec
    var utc = d.getTime() + (d.getTimezoneOffset() * 60000);

    // create new Date object for different city
    // using supplied offset
    var nd = new Date(utc + (3600000*'+2'));


    return '['+nd.toLocaleString()+']';
}






window.onload = function() 
{
	
	nameis = prompt("[ NOM ]");
	
	if (nameis == "")
		nameis = "Anonyme"
		

	//FOCUS TAB
	//window.onfocus	= function () {focust = 1; console.log('1')}
	//window.onblur		= function () {focust = 0; console.log('0')}
	
		
	window.addEventListener('blur', function () {focust = 0; console.log('0')}   );
	window.addEventListener('focus', function () {focust = 1; console.log('1')}  );

}


	
	//reader = new FileReader();
	//reader.onload = function(event) { showMessage(reader.result) };
	
	refTable = document.getElementById("messages");
	divsms = document.getElementById("divsms");
	messageBox = document.getElementById('messageBox');
	
	let ws;
	
	function showMessage(message) {

		
		

		split_user_sms = message.split(' -- ')
		
		superdate = split_user_sms[0]
		username = split_user_sms[1]
		sms	= message.replace(superdate+" -- "+username+" -- ","")
		
		row = refTable.insertRow(-1);
		
		cell_1 = row.insertCell();
		cell_1.innerHTML = superdate;
		cell_1.style.whiteSpace = "nowrap";
		
		cell_2 = row.insertCell();
		cell_2.innerHTML = username;
		
		cell_2 = row.insertCell();
		cell_2.innerHTML = sms;

		
		//messages.textContent += `\n${message}`;
		divsms.scrollTop = divsms.scrollHeight;
		messageBox.value = '';
		
		
		
		//sound
		if (focust == 0)
			new Audio('sound1.mp3').play()
	  
    }







    function init() {
	
	
      if (ws) {
        ws.onerror = ws.onopen = ws.onclose = null;
        ws.close();
      }

      ws = new WebSocket('wss://nouveautestament.alwaysdata.net');

	  
	ws.onopen = () => 
	  {
        console.log('connecté');
		if (x == 0)
		{
			ws.send("getsms");
			x = 1;
		}
      }
    


	ws.onmessage = ( data ) => 
	{
		
		if (data.data != "")
			showMessage(data.data)


      }
	 
	 ws.onclose = function() 
	 {
	 
		//document.getElementById("messages").innerHTML = ""
		ws = null;
		init();
		
	}
    
	
	}

    function sender() {
      if (!ws) {
        
        return ;
      }

      ws.send		("sms -- "	+	getdate() + " -- " + nameis+" -- "+messageBox.value);
      showMessage	(				getdate() + " -- " + nameis+" -- "+messageBox.value);
    }

    init();
	
</script>
</html>
